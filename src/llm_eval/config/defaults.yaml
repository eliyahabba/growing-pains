defaults:
  storage_dir: data/processed
  decay: 0.9
split:
  default:
    train_ratio: 0.6
    link_ratio: 0.2
    test_ratio: 0.2
  overrides: {}
metrics:
  binary_acc:
    higher_is_better: true
    min: 0
    max: 1
    method: minmax
  BLEU:
    higher_is_better: true
    min: 0
    max: 100
    method: minmax
  ROUGE1:
    higher_is_better: true
    min: 0
    max: 1
    method: minmax
  label_only_match:
    higher_is_better: true
    method: binary
  final_number_match:
    higher_is_better: true
    method: binary
  quasi_label_only_match:
    higher_is_better: true
    method: binary
  math_equiv_chain_of_thought:
    higher_is_better: true
    method: binary
  f1_score:
    higher_is_better: true
    min: 0
    max: 1
    method: minmax
  bleu_4:
    higher_is_better: true
    min: 0
    max: 1
    method: minmax


